# Local dev dependencies for CRN: PostgreSQL (jobs/projects/state) + MongoDB
# (BRD/PRD document store, architecture §2.2). The Go backend and Next.js
# frontend run on the host during dev (`go run ./cmd/server`, `npm run dev`);
# only the datastores are containerized here. Production wiring (the CRN backend
# image, the shared "DB กลาง" VM) is out of scope for this compose file.
#
# Usage:
#   docker compose up -d
#   make migrate            # applies migrations/0001_init.sql to Postgres
#
# Compose Spec: no top-level `version:` key (it is obsolete in Compose v2+).

services:
  postgres:
    image: postgres:16-alpine
    container_name: crn-postgres
    environment:
      POSTGRES_USER: crn
      POSTGRES_PASSWORD: crn_dev_password
      POSTGRES_DB: crn
    ports:
      # Host 5433 (not 5432) so we don't collide with a host-installed
      # Postgres (e.g. Homebrew postgresql@14, which binds localhost:5432 and
      # would shadow this container for localhost connections). Container-side
      # stays 5432. DSN: postgres://crn:...@localhost:5433/crn
      - "5433:5432"
    volumes:
      - crn_pgdata:/var/lib/postgresql/data
      # Auto-apply the migrations on first boot of a fresh volume (lexical order).
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_skills.sql:/docker-entrypoint-initdb.d/0002_skills.sql:ro
      - ./migrations/0003_skill_files.sql:/docker-entrypoint-initdb.d/0003_skill_files.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crn -d crn"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: crn-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: crn
      MONGO_INITDB_ROOT_PASSWORD: crn_dev_password
    ports:
      - "27017:27017"
    volumes:
      - crn_mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  crn_pgdata:
  crn_mongodata:
